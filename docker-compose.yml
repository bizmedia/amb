services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: messagebus-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: messagebus
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Next.js app
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: messagebus-app
    ports:
      - "3333:3333"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/messagebus
      # Слушать на всех интерфейсах, чтобы exec (seed:agents и т.д.) мог достучаться до API
      HOSTNAME: "0.0.0.0"
      # Для скриптов внутри контейнера — явно IPv4
      MESSAGE_BUS_URL: http://127.0.0.1:3333
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
