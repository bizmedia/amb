apiVersion: batch/v1
kind: Job
metadata:
  name: amb-api-migrate
  labels:
    app: amb-api
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: amb-api
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: bizmedia/amb-api:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-lc", "pnpm db:migrate:deploy"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: amb-api-secrets
                  key: DATABASE_URL
