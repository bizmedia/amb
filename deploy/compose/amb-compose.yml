name: amb

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-amb}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-amb}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    image: docker.io/openaisdk/amb-api:latest
    pull_policy: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-amb}
      JWT_SECRET: ${JWT_SECRET:-change-me-for-local-dev}
      AMB_BOOTSTRAP: "true"
      PORT: 3334
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-4334}:3334"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3334/api/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    image: docker.io/openaisdk/amb-web-ui:latest
    pull_policy: always
    environment:
      API_URL: http://api:3334
      PORT: 3333
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-4333}:3333"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3333 >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
