# =============================================================================
# Drone CI — AMB (Agent Message Bus)
# =============================================================================
# По образцу ../mega-retro и ../saas-billing:
#   1. ci           — install, lint (web + api), typecheck, test, build
#   2. build-images — Docker-in-Docker: amb-api, amb-web → Timeweb Registry (main)
#   3. deploy       — bare-metal deploy по SSH (sync scripts + env + migrate + compose up)
#
# Organization secrets (имена как в Drone UI):
#   TWC_REGISTRY_HOST, TWC_REGISTRY_USERNAME, TWC_REGISTRY_PASSWORD — Timeweb Container Registry
#   BARE_METAL_SSH_PRIVATE_KEY — private key для deploy@host
#   BARE_METAL_HOST — SSH хост (IP/FQDN) выделенного сервера
#   dockerhub_username, dockerhub_password — учётка Docker Hub (для логина вручную при сборке dockerconfigjson)
#   dockerconfigjson — ОБЯЗАТЕЛЬНО для CI: полное содержимое ~/.docker/config.json после
#     `docker login -u "<dockerhub_username>" -p "<dockerhub_password>"` (без этого Hub даёт
#     unauthenticated pull rate limit на clone/step images: alpine/git, node, docker, curl и т.д.)
#
# Secrets (репозиторий AMB):
#   twc_registry_namespace  — путь в реестре (например megaretro), как в saas-billing
#   AMB_DATABASE_URL        — Postgres URL для API и миграций
#   AMB_JWT_SECRET          — секрет JWT для API
#
# Repository settings → Trusted = ON (Docker-in-Docker privileged).
# Образы node:20.19-alpine — Prisma 7 требует Node 20.19+ (см. engines в корневом package.json).
#
# =============================================================================

# ---------------------------------------------------------------------------
# Pipeline 1: CI
# ---------------------------------------------------------------------------
kind: pipeline
type: docker
name: ci

image_pull_secrets:
  - dockerconfigjson

clone:
  image: alpine/git
  depth: 1

trigger:
  event:
    - push
    - pull_request

# Postgres для e2e-тестов apps/api (Prisma 7 требует реальный connectionString).
services:
  - name: postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: amb

steps:
  - name: install
    image: node:20.19-alpine
    commands:
      - corepack enable
      - corepack prepare pnpm@10.19.0 --activate
      - pnpm install --frozen-lockfile

  - name: lint-web
    image: node:20.19-alpine
    depends_on: [install]
    commands:
      - corepack enable
      - corepack prepare pnpm@10.19.0 --activate
      - pnpm lint

  - name: lint-api
    image: node:20.19-alpine
    depends_on: [install]
    commands:
      - corepack enable
      - corepack prepare pnpm@10.19.0 --activate
      - pnpm lint:api

  - name: typecheck
    image: node:20.19-alpine
    depends_on: [install]
    commands:
      - corepack enable
      - corepack prepare pnpm@10.19.0 --activate
      - pnpm typecheck

  - name: migrate
    image: node:20.19-alpine
    depends_on: [install]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/amb
    commands:
      - corepack enable
      - corepack prepare pnpm@10.19.0 --activate
      - apk add --no-cache postgresql16-client
      - until pg_isready -h postgres -U postgres -d amb; do echo "waiting for postgres..."; sleep 2; done
      - pnpm --filter @amb-app/shared build
      - pnpm --filter @amb-app/db build
      - pnpm db:migrate:deploy

  - name: test
    image: node:20.19-alpine
    depends_on: [install]
    commands:
      - corepack enable
      - corepack prepare pnpm@10.19.0 --activate
      - pnpm test

  - name: test-e2e
    image: node:20.19-alpine
    depends_on: [migrate]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/amb
      JWT_SECRET: ci-jwt-secret
    commands:
      - corepack enable
      - corepack prepare pnpm@10.19.0 --activate
      - pnpm test:e2e

  - name: build
    image: node:20.19-alpine
    depends_on: [lint-web, lint-api, typecheck, test, test-e2e]
    commands:
      - corepack enable
      - corepack prepare pnpm@10.19.0 --activate
      - pnpm build


# ---------------------------------------------------------------------------
# Pipeline 2: Build & push Docker images (main)
# ---------------------------------------------------------------------------
---
kind: pipeline
type: docker
name: build-images

image_pull_secrets:
  - dockerconfigjson

clone:
  image: alpine/git
  depth: 1

trigger:
  branch:
    - main
    - develop
  event:
    - push

depends_on:
  - ci

volumes:
  - name: docker-certs
    temp: {}

services:
  - name: docker
    image: docker:27-dind
    privileged: true
    volumes:
      - name: docker-certs
        path: /certs

steps:
  - name: build-push-all
    image: docker:27
    volumes:
      - name: docker-certs
        path: /certs
    environment:
      DOCKER_HOST: tcp://docker:2376
      DOCKER_TLS_VERIFY: "1"
      DOCKER_CERT_PATH: /certs/client
      REGISTRY_HOST:
        from_secret: TWC_REGISTRY_HOST
      REGISTRY_USERNAME:
        from_secret: TWC_REGISTRY_USERNAME
      REGISTRY_PASSWORD:
        from_secret: TWC_REGISTRY_PASSWORD
      REGISTRY_NAMESPACE:
        from_secret: twc_registry_namespace
    commands:
      - until docker info >/dev/null 2>&1; do echo "Waiting for Docker daemon..."; sleep 2; done
      - docker login -u "$REGISTRY_USERNAME" -p "$REGISTRY_PASSWORD" "$REGISTRY_HOST"
      - apk add --no-cache jq
      - export APP_VERSION=$(jq -r .version package.json)
      - export SHORT_SHA=$(echo "$DRONE_COMMIT_SHA" | cut -c1-7)
      - export IMAGE_TAG="$APP_VERSION-$SHORT_SHA"
      - echo "IMAGE_TAG=$IMAGE_TAG"
      - export PREFIX="$REGISTRY_HOST/$REGISTRY_NAMESPACE"
      - echo "=== Building amb-api ==="
      - >-
        docker build --platform linux/amd64
        -f Dockerfile.api
        -t "$PREFIX/amb-api:$IMAGE_TAG"
        .
      - docker push "$PREFIX/amb-api:$IMAGE_TAG"
      - echo "=== Building amb-web ==="
      - >-
        docker build --platform linux/amd64
        -f Dockerfile
        -t "$PREFIX/amb-web:$IMAGE_TAG"
        .
      - docker push "$PREFIX/amb-web:$IMAGE_TAG"
      - echo "All AMB images pushed"


# ---------------------------------------------------------------------------
# Pipeline 3: Deploy — bare-metal SSH (main/develop)
# ---------------------------------------------------------------------------
---
kind: pipeline
type: docker
name: deploy

image_pull_secrets:
  - dockerconfigjson

clone:
  image: alpine/git
  depth: 1

trigger:
  branch:
    - main
    - develop
  event:
    - push

depends_on:
  - build-images

steps:
  - name: bare-metal-ssh
    image: alpine:3.20
    environment:
      TWC_REGISTRY_HOST:
        from_secret: TWC_REGISTRY_HOST
      REGISTRY_NAMESPACE:
        from_secret: twc_registry_namespace
      BARE_METAL_SSH_PRIVATE_KEY:
        from_secret: BARE_METAL_SSH_PRIVATE_KEY
      BARE_METAL_HOST:
        from_secret: BARE_METAL_HOST
      AMB_DATABASE_URL:
        from_secret: AMB_DATABASE_URL
      AMB_JWT_SECRET:
        from_secret: AMB_JWT_SECRET
    commands:
      - |
        set -e
        apk add --no-cache openssh-client bash jq
        BHOST="$BARE_METAL_HOST"
        BUSER=deploy

        umask 077
        printf '%s' "$BARE_METAL_SSH_PRIVATE_KEY" | tr -d '\r' > /tmp/sshkey
        test -s /tmp/sshkey
        chmod 600 /tmp/sshkey
        if ! ssh-keygen -y -f /tmp/sshkey >/dev/null 2>&1; then
          printf '%s' "$BARE_METAL_SSH_PRIVATE_KEY" | tr -d '\r' | base64 -d > /tmp/sshkey
          chmod 600 /tmp/sshkey
        fi
        if ! ssh-keygen -y -f /tmp/sshkey >/dev/null 2>&1; then
          echo "BARE_METAL_SSH_PRIVATE_KEY is invalid. Use full PEM or one-line base64." >&2
          exit 1
        fi

        APP_VERSION=$(jq -r .version package.json)
        SHORT_SHA=$(echo "$DRONE_COMMIT_SHA" | cut -c1-7)
        IMAGE_TAG="$APP_VERSION-$SHORT_SHA"
        PREFIX="$TWC_REGISTRY_HOST/$REGISTRY_NAMESPACE"
        AMB_API_IMAGE="$PREFIX/amb-api:$IMAGE_TAG"
        AMB_WEB_IMAGE="$PREFIX/amb-web:$IMAGE_TAG"

        echo "Deploy to $BUSER@$BHOST tag=$IMAGE_TAG"
        tar -C ops/bare-metal -czf - . | ssh -oBatchMode=yes -oStrictHostKeyChecking=accept-new -i /tmp/sshkey \
          "$BUSER@$BHOST" \
          "set -e; mkdir -p /opt/amb-app; if [ ! -w /opt/amb-app ]; then echo '/opt/amb-app must be owned by deploy:deploy' >&2; exit 1; fi; tar -xzf - -C /opt/amb-app; chmod +x /opt/amb-app/bin/*.sh"

        {
          printf '%s\n' "NODE_ENV=production"
          printf '%s\n' "PORT=3334"
          printf '%s\n' "AMB_BOOTSTRAP=true"
          printf '%s\n' "AMB_SWAGGER_ENABLED=false"
          printf 'DATABASE_URL=%s\n' "$AMB_DATABASE_URL"
          printf 'JWT_SECRET=%s\n' "$AMB_JWT_SECRET"
        } > /tmp/amb-app.env
        chmod 600 /tmp/amb-app.env

        scp -oBatchMode=yes -oStrictHostKeyChecking=accept-new -i /tmp/sshkey /tmp/amb-app.env "$BUSER@$BHOST:/tmp/amb-app.env"
        ssh -oBatchMode=yes -oStrictHostKeyChecking=accept-new -i /tmp/sshkey \
          "$BUSER@$BHOST" \
          "set -e; install -m 600 /tmp/amb-app.env /opt/amb-app/.env; rm -f /tmp/amb-app.env"
        rm -f /tmp/amb-app.env

        ssh -oBatchMode=yes -oStrictHostKeyChecking=accept-new -i /tmp/sshkey \
          "$BUSER@$BHOST" \
          "set -e; export AMB_API_IMAGE='$AMB_API_IMAGE'; export AMB_WEB_IMAGE='$AMB_WEB_IMAGE'; export AMB_SKIP_MIGRATION=0; /opt/amb-app/bin/remote-pull-and-up.sh"
