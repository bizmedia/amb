networks:
  edge:
    name: amb-app

services:
  amb-api:
    image: ${AMB_API_IMAGE}
    pull_policy: always
    container_name: amb-api
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "3334"
    networks: [edge]
    ports:
      - "127.0.0.1:4201:3334"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3334/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

  amb-web:
    image: ${AMB_WEB_IMAGE}
    pull_policy: always
    container_name: amb-web
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "3333"
      HOSTNAME: "0.0.0.0"
      API_URL: "http://amb-api:3334"
    depends_on:
      amb-api:
        condition: service_healthy
    networks: [edge]
    ports:
      - "127.0.0.1:3201:3333"
