name: API CI

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "packages/db/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".github/workflows/api-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "packages/db/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".github/workflows/api-ci.yml"

jobs:
  api-checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: amb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d amb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/amb
      JWT_SECRET: ci-jwt-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Migrate DB
        run: pnpm db:migrate:deploy

      - name: API Typecheck
        run: pnpm --filter amb-api typecheck

      - name: API E2E
        run: pnpm --filter amb-api test:e2e
