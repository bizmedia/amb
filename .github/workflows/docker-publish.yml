name: Publish Public Artifacts

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-public-artifacts-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY_PREFIX: docker.io/openaisdk

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Check Docker image version
        id: docker-version
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          IMAGES=(
            "docker.io/openaisdk/amb-web-ui:$PACKAGE_VERSION"
            "docker.io/openaisdk/amb-api:$PACKAGE_VERSION"
          )

          for image in "${IMAGES[@]}"; do
            if ! docker buildx imagetools inspect "$image" >/dev/null 2>&1; then
              echo "should_publish=true" >> "$GITHUB_OUTPUT"
              echo "Docker image version $PACKAGE_VERSION is not fully published yet. Publishing is enabled."
              exit 0
            fi
          done

          echo "should_publish=false" >> "$GITHUB_OUTPUT"
          echo "Docker image version $PACKAGE_VERSION already exists in Docker Hub."
          echo "If you want to publish new public artifacts, bump the version in package.json first."

      - name: Check npm package version
        id: npm-version
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(node -p "require('./packages/mcp-server/package.json').version")
          if npm view @openaisdk/amb-mcp@"$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "npm package version $PACKAGE_VERSION already exists."
            echo "If you want to publish a new npm package, bump the version in package.json first."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "npm package version $PACKAGE_VERSION is not published yet. Publishing is enabled."
          fi

      - name: Skip publish because version already exists
        if: steps.docker-version.outputs.should_publish != 'true' && steps.npm-version.outputs.should_publish != 'true'
        run: |
          echo "All public artifact versions already exist."
          echo "Update the version in package.json before publishing a new release."

      - name: Publish public artifacts
        if: steps.docker-version.outputs.should_publish == 'true' || steps.npm-version.outputs.should_publish == 'true'
        run: sh scripts/release/publish-public-artifacts.sh
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PUBLISH_NPM: ${{ steps.npm-version.outputs.should_publish }}
