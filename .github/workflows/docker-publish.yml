name: Publish Public Artifacts

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-public-artifacts-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY_PREFIX: docker.io/openaisdk

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Check npm package version
        id: npm-version
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(node -p "require('./packages/mcp-server/package.json').version")
          if npm view @openaisdk/amb-mcp@"$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Package version $PACKAGE_VERSION already exists on npm. Skipping npm publish."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Package version $PACKAGE_VERSION is not on npm yet. Publishing is enabled."
          fi

      - name: Publish public artifacts
        run: pnpm release:publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PUBLISH_NPM: ${{ steps.npm-version.outputs.should_publish }}
